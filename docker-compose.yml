services:
  # ── InfluxDB — time-series store ─────────────────────────────────────────────
  # CQRS write bucket : events      (∞  retention) — raw checkin/checkout events
  # CQRS read  bucket : projections (90d retention) — aggregated data for Grafana
  influxdb:
    image: influxdb:2.7-alpine
    container_name: shared-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=tcc-org
      - DOCKER_INFLUXDB_INIT_BUCKET=events
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=tcc-local-super-secret-token
    volumes:
      - ./data/influxdb/data:/var/lib/influxdb2
      - ./data/influxdb/config:/etc/influxdb2
    networks:
      - shared-infra-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8086/ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Creates the read-side bucket after InfluxDB is ready.
  # The write-side bucket (events) is already created by DOCKER_INFLUXDB_INIT_BUCKET above.
  influxdb-init:
    image: influxdb:2.7-alpine
    container_name: shared-influxdb-init
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      - INFLUX_HOST=http://influxdb:8086
      - INFLUX_TOKEN=tcc-local-super-secret-token
      - INFLUX_ORG=tcc-org
    entrypoint: >
      sh -c "
        influx bucket list --org tcc-org | grep -q projections ||
        influx bucket create --name projections --org tcc-org --retention 90d
      "
    networks:
      - shared-infra-network
    restart: on-failure

  # ── MariaDB — relational store ────────────────────────────────────────────────
  # CQRS write DB : eventhub      — areas registry, entity state, outbox
  # CQRS read  DB : eventhub_read — materialized projections / reports
  # Both databases are created on first startup; see mariadb/init/ for the read DB.
  mariadb:
    image: mariadb:11.4
    container_name: shared-mariadb
    ports:
      - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=tcc-root
      - MARIADB_DATABASE=eventhub
      - MARIADB_USER=eventhub
      - MARIADB_PASSWORD=tcc-eventhub
    volumes:
      - ./data/mariadb:/var/lib/mysql
    networks:
      - shared-infra-network
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Creates the read-side database (eventhub_read) and its schema after MariaDB is ready.
  # CQRS write DB : eventhub       — created by MARIADB_DATABASE above
  # CQRS read  DB : eventhub_read  — created by this init container
  mariadb-init:
    image: mariadb:11.4
    container_name: shared-mariadb-init
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      - MYSQL_PWD=tcc-root
    entrypoint: >
      sh -c "
        mariadb -h shared-mariadb -u root < /sql/01_read_database.sql &&
        mariadb -h shared-mariadb -u root < /sql/02_read_schema.sql &&
        mariadb -h shared-mariadb -u root < /sql/03_virtual_areas_database.sql &&
        mariadb -h shared-mariadb -u root < /sql/04_backfill_projections.sql
      "
    volumes:
      - ./mariadb/init:/sql
    networks:
      - shared-infra-network
    restart: on-failure

  # ── Vault — secrets for external APIs ────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    container_name: shared-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: tcc-local-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    networks:
      - shared-infra-network
    healthcheck:
      test: [ "CMD", "vault", "status", "-address=http://localhost:8200" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Reads real API tokens from .env and seeds them into Vault KV
  vault-init:
    image: hashicorp/vault:1.17
    container_name: shared-vault-init
    depends_on:
      vault:
        condition: service_healthy
    env_file:
      - .env
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: tcc-local-root-token
    entrypoint: >
      sh -c "
        vault kv put secret/live-ms-java olhovivo.token=$LIVE_MS_JAVA_OLHOVIVO_TOKEN &&
        vault kv put secret/constructive-airsim-ms nvidia.api_key=$NVIDIA_NIM_API_KEY
      "
    networks:
      - shared-infra-network
    restart: on-failure

  # ── Proto Codegen — builds Rust stubs from proto-shared ──────────────────────
  proto-codegen:
    image: proto-codegen:latest
    build:
      context: ../proto-shared
      dockerfile: codegen.Dockerfile

  # ── Event Hub — gRPC event ingestion service ─────────────────────────────────
  event-hub:
    build:
      context: ../event-hub
      dockerfile: Dockerfile
    container_name: event-hub
    ports:
      - "50051:50051"
    volumes:
      - event-hub-data:/data
      - ../event-hub/config/config.yml:/app/config/config.yml:ro
    networks:
      - shared-infra-network
    depends_on:
      proto-codegen:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      mariadb-init:
        condition: service_completed_successfully
      influxdb:
        condition: service_healthy
      influxdb-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Grafana — dashboards ──────────────────────────────────────────────────────
  # Default datasource : InfluxDB Projections (read side)
  # All 4 CQRS stores are provisioned as datasources for debugging.
  grafana:
    image: grafana/grafana:latest
    container_name: shared-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PLUGINS_PREINSTALL_SYNC=grafana-clock-panel,volkovlabs-image-panel
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    networks:
      - shared-infra-network
    depends_on:
      influxdb:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Virtual Areas MS — geofence detector + Vaadin UI ─────────────────────────
  virtual-areas-ms-java:
    build:
      context: ..
      dockerfile: virtual-ms-java/virtual-areas/Dockerfile
    container_name: virtual-areas-ms-java
    ports:
      - "8082:8082"
      - "50052:50052"
    environment:
      - MARIADB_HOST=shared-mariadb
      - EVENTHUB_HOST=event-hub
      - EVENTHUB_PORT=50051
      - INFLUXDB_URL=http://shared-influxdb:8086
      - INFLUXDB_TOKEN=tcc-local-super-secret-token
      - INFLUXDB_ORG=tcc-org
      - INFLUXDB_BUCKET=projections
    networks:
      - shared-infra-network
    depends_on:
      mariadb:
        condition: service_healthy
      mariadb-init:
        condition: service_completed_successfully
      influxdb:
        condition: service_healthy
      event-hub:
        condition: service_started
    restart: unless-stopped

networks:
  shared-infra-network:
    name: shared-infra-network
    driver: bridge

volumes:
  event-hub-data:
